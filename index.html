<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Kellerautomat</h1>
    <p>Implementiert in WebAssembly</p>

    <input id="inputBox" value="3 4 + 6 2 + 8 9 + 4 3 + * * *" type="text">
    <button id="runButton">Run (Laufmodus)</button>
    <button id="runButton">Run (Step-Modus)</button>
    <p>Result: <span id="resultSpan"></span></p>
</body>

<script type="module">

    document.querySelector("#runButton").addEventListener("click", evaluateKeller)

    async function evaluateKeller() {
        const input = document.querySelector("#inputBox").value;

        const inputData = input.split(' ').map(x => {
            if (x == '+') {
                return -1;
            }
            if (x == '*') {
                return -2;
            }
            return x;
        });

        document.querySelector("#resultSpan").innerHTML = execute(inputData);
    }

    async function evaluateKellerStepped() {
        const input = document.querySelector("#inputBox").value;

        const inputData = input.split(' ').map(x => {
            if (x == '+') {
                return -1;
            }
            if (x == '*') {
                return -2;
            }
            return x;
        });

        for (var i = 1; i < inputData.length; i++) {
            const stack = execute(inputData.slice(0, i));
        }

        document.querySelector("#resultSpan").innerHTML = execute(inputData);
    }

    async function execute(inputData) {
        const memory = new WebAssembly.Memory({
            initial: 1,
        });

        const array = new Int32Array(memory.buffer);

        for (let i = 0; i < inputData.length; i++) {
            array[i] = inputData[i]
        }

        const result = await WebAssembly.instantiateStreaming(fetch("wasm.wasm"), { js: { mem: memory }, });

        const res = result.instance.exports.execute(inputData.length * 4)

        return res;
    }
</script>

</html>
