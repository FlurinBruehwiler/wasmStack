<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Kellerautomat</h1>
    <p>Implementiert in WebAssembly</p>

    <div>
        <input id="inputBox" value="3 4 + 6 2 + 8 9 + 4 3 + * * *" type="text">
        <span id="highlightedInput"></span>
    </div>
    <button id="runButton">Run (Laufmodus)</button>
    <button id="runStepedButton">Run (Step-Modus)</button>
    <p>Result: <span id="resultSpan"></span></p>
</body>

<script type="module">

    document.querySelector("#runButton").addEventListener("click", evaluateKeller)
    document.querySelector("#runStepedButton").addEventListener("click", evaluateKellerStepped)

    async function evaluateKeller() {
        const input = document.querySelector("#inputBox").value;

        const inputData = input.split(' ').map(x => {
            if (x == '+') {
                return -1;
            }
            if (x == '*') {
                return -2;
            }
            return x;
        });

        document.querySelector("#resultSpan").innerHTML = await execute(inputData);
    }

    async function evaluateKellerStepped() {
        const input = document.querySelector("#inputBox").value;

        const inputData = input.split(' ').map(x => {
            if (x == '+') {
                return -1;
            }
            if (x == '*') {
                return -2;
            }
            return x;
        });

        for (var i = 0; i < inputData.length; i++) {
            displayInputHighlighted(input.split(' '), i);
        
            const inputDataSliced = inputData.slice(0, i + 1);
            const stack = await execute(inputDataSliced);

            //console.log(inputDataSliced, [...stack])
            document.querySelector("#resultSpan").innerHTML = stack;
            await wait(1000);
        }
    }

    function displayInputHighlighted(inputData, highlightedIndex){
        const highlightedInput = document.querySelector("#highlightedInput");
        highlightedInput.innerHTML = '';

        for(var i = 0; i < inputData.length; i++) {
            const span = document.createElement('span');
            highlightedInput.appendChild(span);
            span.textContent = inputData[i];
            if (i == highlightedIndex) {
                span.style.backgroundColor = 'red'
            }
        }
    }

    async function wait(time){
        return new Promise((resolve, reject) => {
            setTimeout(() => {
                resolve();
            }, time);
        });
    }

    async function execute(inputData) {
        const memory = new WebAssembly.Memory({
            initial: 1,
        });

        const array = new Int32Array(memory.buffer);

        for (let i = 0; i < inputData.length; i++) {
            array[i] = inputData[i]
        }

        const result = await WebAssembly.instantiateStreaming(fetch("wasm.wasm"), { js: { mem: memory }, });

        const sizeOfStack = result.instance.exports.execute(inputData.length * 4)

        return array.slice(inputData.length + 1, (sizeOfStack / 4) + 1)
    }
</script>

</html>
